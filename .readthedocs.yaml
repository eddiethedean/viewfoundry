# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: '3.12'
    nodejs: '20'
  commands:
    # RTD uses asdf for Node; global pnpm is more reliable than corepack shims here.
    - npm install -g pnpm@9.15.9
    - pnpm install --frozen-lockfile
    - pip install -r apps/docs/requirements.txt
    - node scripts/build-docs.mjs

# Sphinx config path (used for RTD dashboard metadata)
sphinx:
  configuration: apps/docs/conf.py
